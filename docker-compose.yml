services:
  # -------------------------------------
  # 1. Primary Database (PostgreSQL)
  # -------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: medsum_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-medsum_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-supersecret123}
      POSTGRES_DB: ${DB_NAME:-medsum_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medsum_user -d medsum_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -------------------------------------
  # 2. Message Broker (Official Apache Kafka KRaft)
  # -------------------------------------
  kafka:
    image: apache/kafka:3.7.0
    container_name: medsum_kafka
    user: "root"      # <--- ADD THIS LINE
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/tmp/kafka-logs

  # -------------------------------------
  # 3. Receiver Service (FastAPI)
  # -------------------------------------
  receiver-service:
    build:
      context: ./services/receiver-service
    container_name: medsum_receiver
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://medsum_user:supersecret123@postgres:5432/medsum_db
      - KAFKA_BROKER_URL=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    volumes:
      - ./services/receiver-service/app:/app/app

  # -------------------------------------
  # 4. Summarizer Service (NLP Worker)
  # -------------------------------------
  summarizer-service:
    build:
      context: ./services/summarizer-service
    container_name: medsum_summarizer
    environment:
      - RECEIVER_API_URL=http://receiver-service:8000
      - KAFKA_BROKER_URL=kafka:9092
    depends_on:
      - kafka
    volumes:
      - ./services/summarizer-service/app:/app/app

volumes:
  postgres_data:
  kafka_data: